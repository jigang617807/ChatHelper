services:
  app:
    build:
      context: .
    image: chathelper-app:latest
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-rag_demo}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ES_URIS: http://elasticsearch:9200
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:?Set ZHIPU_API_KEY in .env before starting}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-chathelper}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-change-this-rabbitmq-password}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_THYMELEAF_CACHE: ${SPRING_THYMELEAF_CACHE:-true}
      RAG_VECTOR_TOPK: ${RAG_VECTOR_TOPK:-20}
      RAG_BM25_TOPK: ${RAG_BM25_TOPK:-20}
      RAG_FINAL_TOPK: ${RAG_FINAL_TOPK:-5}
      RAG_FUSION_STRATEGY: ${RAG_FUSION_STRATEGY:-rrf}
      RAG_FUSION_RRF_K: ${RAG_FUSION_RRF_K:-60}
      RAG_FUSION_VECTOR_WEIGHT: ${RAG_FUSION_VECTOR_WEIGHT:-0.6}
      RAG_FUSION_BM25_WEIGHT: ${RAG_FUSION_BM25_WEIGHT:-0.4}
      RAG_RERANK_ENABLED: ${RAG_RERANK_ENABLED:-false}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_demo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag_demo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "127.0.0.1:${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-chathelper}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-this-rabbitmq-password}
    ports:
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  es_data:
  rabbitmq_data:
  uploads_data:
