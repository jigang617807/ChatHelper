spring:
# ------ 新增配置开始 ------
  servlet:
    multipart:
      max-file-size: 50MB      # 单个文件最大 50MB (按需调整)
      max-request-size: 50MB   # 整个请求最大 50MB
# ------ 新增配置结束 ------
#  链接数据库
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rag_demo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
#定义是否由其自动生成数据库！
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
#配置API

zhipu:
#  embedding模型都要花钱！
  embedding-model: "embedding-3"
#  花钱模型
#  chat-model: "glm-4-plus"
#  免费模型
  chat-model: "glm-4.5-flash"

upload:
#  dir: D:/javalearning/demo
  dir: .
  root: uploads/
  avatar: uploads/avatar/
  docs: uploads/docs/
