spring:
  thymeleaf:
    cache: false
  # ------ 新增配置开始 ------
  servlet:
    multipart:
      max-file-size: 50MB      # 单个文件最大 50MB (按需调整)
      max-request-size: 50MB   # 整个请求最大 50MB
  # ------ 新增配置结束 ------
  #  链接数据库
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rag_demo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  #定义是否由其自动生成数据库！
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  ai:
    model:
      chat: zhipuai
      embedding: zhipuai
    zhipuai:
      api-key: ${ZHIPU_API_KEY}
      base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas}
      chat:
        options:
          model: ${zhipu.chat-model}
      embedding:
        options:
          model: ${zhipu.embedding-model}
          dimensions: 768
    mcp:
      client:
        enabled: ${MCP_ENABLED:false}
        name: rag-agent-mcp-client
        version: 1.0.0
        request-timeout: 30s
        type: SYNC
        toolcallback:
          enabled: true

#配置API
zhipu:
  #  embedding模型都要花钱！
  embedding-model: "embedding-3"
  #  花钱模型
  #  chat-model: "glm-4-plus"
  #  免费模型
  #  chat-model: "glm-4.5-flash" 过期了！
  #  chat-model: "glm-4.6v-flash"
  chat-model: "glm-4.7-flash"

agent:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_CHAT_MODEL:deepseek-chat}
    temperature: ${DEEPSEEK_TEMPERATURE:0.4}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:2048}
  react:
    max-steps: ${AGENT_REACT_MAX_STEPS:8}
    workspace-root: ${AGENT_REACT_WORKSPACE_ROOT:uploads/agent-workspace}
    web-search:
      api-key: ${AGENT_REACT_WEB_SEARCH_API_KEY:}
      endpoint: ${AGENT_REACT_WEB_SEARCH_ENDPOINT:https://api.tavily.com/search}
    resource-download:
      max-bytes: ${AGENT_REACT_RESOURCE_MAX_BYTES:10485760}
    pdf:
      font-path: ${AGENT_REACT_PDF_FONT_PATH:}

upload:
  #  dir: D:/javalearning/demo
  dir: .
  root: uploads/
  avatar: uploads/avatar/
  docs: uploads/docs/

rag:
  cache:
    enabled: ${RAG_CACHE_ENABLED:true}
    ttl-seconds: ${RAG_CACHE_TTL_SECONDS:3600}
    key-prefix: rag:retrieval:v1
  retrieval:
    vector-topk: ${RAG_VECTOR_TOPK:20}
    bm25-topk: ${RAG_BM25_TOPK:20}
    final-topk: ${RAG_FINAL_TOPK:5}
    fusion:
      strategy: ${RAG_FUSION_STRATEGY:rrf}
      rrf-k: ${RAG_FUSION_RRF_K:60}
      vector-weight: ${RAG_FUSION_VECTOR_WEIGHT:0.6}
      bm25-weight: ${RAG_FUSION_BM25_WEIGHT:0.4}
    rerank:
      enabled: ${RAG_RERANK_ENABLED:false}
