<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📄 文档问答</title>
    <link rel="stylesheet" href="/premium.css">
    <script src="https://unpkg.com/event-source-polyfill/src/eventsource.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<div class="app-shell">
    <div class="main-card chat-shell">
        <h2 class="title">📄 文档问答</h2>

        <div id="chatBox">
            <div th:each="m : ${messages}">
                <div th:if="${m.role == 'user'}" class="msg user-msg">
                    <div class="bubble user-bubble" th:text="${m.message}"></div>
                </div>

                <div th:if="${m.role == 'assistant'}" class="msg ai-msg">
                    <div class="bubble ai-bubble markdown-content" th:text="${m.message}"></div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="msg" placeholder="请输入你的问题..." onkeydown="if(event.keyCode===13 && !event.shiftKey) { event.preventDefault(); sendMsg(); }"></textarea>
            <button class="btn" onclick="sendMsg()">发送</button>
        </div>

        <div class="actions">
            <button class="btn btn-danger" onclick="clearChat()">清除记录</button>
            <a href="/doc/list"><button type="button" class="btn btn-secondary">返回文档列表</button></a>
        </div>

        <input type="hidden" id="convId" th:value="${conversationId}">
        <input type="hidden" id="docId"  th:value="${documentId}">
    </div>
</div>

<script>
    marked.setOptions({ gfm: true, breaks: true });

    function normalizeSseChunk(data) {
        if (!data) return "";
        let chunk = data;
        if (chunk.startsWith("data:")) {
            chunk = chunk.substring(5).trimStart();
        }
        return chunk
            .replace(/\\n/g, "\n")
            .replace(/\\t/g, "\t")
            .replace(/\\\"/g, '"');
    }

    function renderMarkdownTo(el, markdownText) {
        el.innerHTML = marked.parse(markdownText || "");
    }

    document.addEventListener("DOMContentLoaded", function() {
        const aiBubbles = document.querySelectorAll(".markdown-content");
        aiBubbles.forEach(el => {
            const rawText = el.textContent;
            renderMarkdownTo(el, rawText);
            hljs.highlightAll();
        });
        const box = document.getElementById("chatBox");
        box.scrollTop = box.scrollHeight;
    });

    let evtSource = null;

    function handleEnter(event) {
        if (event.keyCode === 13 && !event.shiftKey) {
            event.preventDefault();
            sendMsg();
        }
    }
    document.getElementById("msg").addEventListener("keydown", handleEnter);

    function sendMsg() {
        const text = document.getElementById("msg").value.trim();
        if (!text) return;

        const convId = document.getElementById("convId").value;
        const docId  = document.getElementById("docId").value;
        const box    = document.getElementById("chatBox");

        const userDiv = document.createElement("div");
        userDiv.className = "msg user-msg";
        userDiv.innerHTML = `<div class="bubble user-bubble">${text}</div>`;
        box.appendChild(userDiv);

        document.getElementById("msg").value = "";

        const aiDiv = document.createElement("div");
        aiDiv.className = "msg ai-msg";

        const aiBubble = document.createElement("div");
        aiBubble.className = "bubble ai-bubble";
        aiBubble.innerHTML = "<span>▋</span>";

        aiDiv.appendChild(aiBubble);
        box.appendChild(aiDiv);
        box.scrollTop = box.scrollHeight;

        if (evtSource) evtSource.close();

        const url = `/chat/ask?conversationId=${convId}&documentId=${docId}&question=${encodeURIComponent(text)}`;
        evtSource = new EventSourcePolyfill(url);

        let full = "";

        evtSource.onmessage = function (e) {
            if (e.data === "[DONE]") {
                evtSource.close();
                evtSource = null;
                hljs.highlightAll();
                return;
            }

            full += normalizeSseChunk(e.data);
            renderMarkdownTo(aiBubble, full);
            box.scrollTop = box.scrollHeight;
        };

        evtSource.onerror = function(err) {
            console.error("SSE Error:", err);
            full += "\n\n(连接中断或服务器错误)";
            renderMarkdownTo(aiBubble, full);
            evtSource.close();
            evtSource = null;
        };
    }

    function clearChat() {
        const docId = document.getElementById("docId").value;

        if (!confirm("确定要清除本次文档问答的所有历史记录吗？")) {
            return;
        }

        if (evtSource) {
            evtSource.close();
            evtSource = null;
        }

        fetch('/chat/clear', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ 'documentId': docId })
        })
        .then(response => {
            if (response.ok) {
                window.location.href = `/chat/start?docId=${docId}`;
            } else {
                response.text().then(errorMessage => {
                    alert(`清除记录失败: ${errorMessage || response.statusText}`);
                });
            }
        })
        .catch(error => {
            console.error('清除请求出错:', error);
            alert('网络或服务器错误，清除记录失败。');
        });
    }
</script>

</body>
</html>
