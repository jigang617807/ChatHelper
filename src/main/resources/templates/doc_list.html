<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文档</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body class="auth-shell">

<div class="auth-card wide-card">
    <h2 class="title">我的文档</h2>

    <div class="table-wrap">
        <table class="doc-table">
            <thead>
            <tr>
                <th>文件名</th>
                <th>状态</th>
                <th>上传时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${docs.size() == 0}">
                <td colspan="4" class="empty-tip">暂无文档，请先上传 PDF</td>
            </tr>

            <tr th:each="doc : ${docs}">
                <td class="filename-cell" th:text="${doc.title}" th:title="${doc.title}">项目需求文档.pdf</td>
                <td>
                    <span th:if="${doc.status.name() == 'COMPLETED'}" class="badge badge-success">✅ 已完成</span>
                    <span th:if="${doc.status.name() == 'PROCESSING'}" class="badge badge-warning">🔄 处理中</span>
                    <span th:if="${doc.status.name() == 'PENDING'}" class="badge badge-pending">⏳ 排队中</span>
                    <span th:if="${doc.status.name() == 'FAILED'}" class="badge badge-danger">❌ 失败</span>
                </td>
                <td class="time-cell" th:text="${doc.uploadedAt}" th:title="${doc.uploadedAt}">2025-11-20 14:30</td>
                <td>
                    <div class="actions">
                        <a th:if="${doc.status.name() == 'COMPLETED'}" th:href="@{'/chat/start?docId=' + ${doc.id}}">
                            <button class="btn btn-success btn-sm">开始对话</button>
                        </a>

                        <button th:unless="${doc.status.name() == 'COMPLETED'}" class="btn btn-secondary btn-sm btn-disabled" disabled>
                            准备中
                        </button>

                        <button class="btn btn-danger btn-sm" th:attr="onclick=|confirmDelete(${doc.id}, '${doc.title}')|">删除</button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="linkbar">
        <a href="/auth/home"><button type="button" class="btn btn-secondary">返回主页</button></a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const hasProcessing = document.body.innerText.includes("处理中") || document.body.innerText.includes("排队中");
        if (hasProcessing) {
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        }
    });

    function confirmDelete(docId, docTitle) {
        if (!confirm(`确定要删除文档 "${docTitle}" (ID: ${docId}) 吗？`)) {
            return;
        }

        const deleteUrl = '/doc/delete';

        fetch(deleteUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: new URLSearchParams({ 'docId': docId })
        })
        .then(response => {
            if (response.ok) {
                alert(`文档 "${docTitle}" 删除成功！`);
                window.location.reload();
            } else {
                response.text().then(errorMessage => {
                    alert(`删除失败: ${errorMessage || response.statusText}`);
                }).catch(() => {
                    alert(`删除失败: ${response.statusText}`);
                });
            }
        })
        .catch(error => {
            console.error('删除请求出错:', error);
            alert('网络或服务器错误，删除失败。请检查控制台。');
        });
    }
</script>

</body>
</html>
