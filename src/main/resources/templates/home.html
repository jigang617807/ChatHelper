<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能文档工作台</title>
    <link rel="stylesheet" href="/premium.css">
    <script src="https://unpkg.com/event-source-polyfill/src/eventsource.min.js"></script>
</head>
<body>

<div class="app-shell home-full-app">
    <div class="workspace home-workspace">
        <aside class="sidebar home-sidebar">
            <div class="avatar-box">
                <img th:src="${avatarPath}" alt="用户头像">
                <div class="username" th:text="${username}">用户名</div>
            </div>

            <div class="home-nav-group">
                <a class="nav-link" href="/doc/list"><button class="nav-btn">文档工作台</button></a>
                <a class="nav-link" href="/agent/doc"><button class="nav-btn">文档任务 Agent</button></a>
                <a class="nav-link" href="/agent"><button class="nav-btn">通用 Agent 工作台</button></a>
                <a class="nav-link" href="/user/profile"><button class="nav-btn">个人资料维护</button></a>
            </div>

            <a class="nav-link logout-bottom" href="/auth/logout"><button class="logout-btn">退出登录</button></a>
        </aside>

        <main class="main-card home-main">
            <h2 class="title">智能文档工作台</h2>
            <p class="subtitle">支持文档问答、语义检索、任务 Agent 与实时对话。</p>

            <div class="chat-box">
                <div class="chat-content" id="chatDisplay">
                    <p class="empty-tip">可以先问一个通用问题，也可以进入文档工作台上传 PDF 后进行 RAG 问答。</p>
                </div>
            </div>

            <div class="input-area input-compact-grid">
                <a href="/doc/list"><button type="button" class="btn btn-secondary">+</button></a>
                <input type="text" id="userInput" placeholder="输入问题..." onkeypress="if(event.keyCode===13) sendMessage()">
                <button class="btn" onclick="sendMessage()">发送</button>
            </div>
        </main>
    </div>
</div>

<script>
    let homeEventSource = null;

    function sendMessage() {
        const input = document.getElementById("userInput");
        const sendButton = document.querySelector(".input-area .btn:not(.btn-secondary)");
        const text = input.value.trim();
        if (!text) return;

        const display = document.getElementById("chatDisplay");
        const tip = document.querySelector(".empty-tip");
        if (tip) tip.remove();

        const userMsgDiv = document.createElement("div");
        userMsgDiv.className = "msg user-msg";
        const userBubble = document.createElement("div");
        userBubble.className = "bubble user-bubble";
        userBubble.textContent = text;
        userMsgDiv.appendChild(userBubble);
        display.appendChild(userMsgDiv);

        input.value = "";
        input.disabled = true;
        sendButton.disabled = true;
        display.scrollTop = display.scrollHeight;

        const botMsgDiv = document.createElement("div");
        botMsgDiv.className = "msg ai-msg";
        const botBubble = document.createElement("div");
        botBubble.className = "bubble ai-bubble";
        botBubble.textContent = "...";
        botMsgDiv.appendChild(botBubble);
        display.appendChild(botMsgDiv);
        display.scrollTop = display.scrollHeight;

        if (homeEventSource) homeEventSource.close();

        const url = `/auth/home/ask?question=${encodeURIComponent(text)}`;
        const EventSourceClass = window.EventSourcePolyfill || window.EventSource;
        homeEventSource = new EventSourceClass(url);
        let full = "";

        homeEventSource.onmessage = function (event) {
            if (event.data === "[DONE]") {
                homeEventSource.close();
                homeEventSource = null;
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
                return;
            }
            full += event.data;
            botBubble.textContent = full;
            display.scrollTop = display.scrollHeight;
        };

        homeEventSource.onerror = function () {
            if (!full) {
                full = "模型调用失败，请稍后重试。";
            }
            botBubble.textContent = full;
            homeEventSource.close();
            homeEventSource = null;
            input.disabled = false;
            sendButton.disabled = false;
            input.focus();
        };
    }
</script>
</body>
</html>
