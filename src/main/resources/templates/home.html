<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能工作空间</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body>

<div class="app-shell">
    <div class="workspace home-workspace">
        <aside class="sidebar home-sidebar">
            <div class="avatar-box">
                <img th:src="${avatarPath}" alt="头像">
                <div class="username" th:text="${username}">用户名</div>
            </div>

            <div class="home-nav-group">
                <a class="nav-link" href="/user/profile"><button class="nav-btn">个人资料维护</button></a>
                <a class="nav-link" href="/doc/list"><button class="nav-btn">文档列表</button></a>
                <a class="nav-link" href="/doc/upload"><button class="nav-btn">上传文档</button></a>
            </div>

            <a class="nav-link logout-bottom" href="/auth/logout"><button class="logout-btn">退出登录</button></a>
        </aside>

        <main class="main-card home-main">
            <h2 class="title">智能工作台</h2>
            <p class="subtitle">支持文档问答、语义检索与实时会话</p>

            <div class="chat-box">
                <div class="chat-content" id="chatDisplay">
                    <p class="empty-tip">欢迎回来！<br>你可以在下方输入框向大模型提问。</p>
                </div>
            </div>

            <div class="input-area input-compact-grid">
                <a href="/doc/upload"><button type="button" class="btn btn-secondary">+</button></a>
                <input type="text" id="userInput" placeholder="询问任何问题..." onkeypress="if(event.keyCode===13) sendMessage()">
                <button class="btn" onclick="sendMessage()">发送</button>
            </div>
        </main>
    </div>
</div>

<script>
    function sendMessage() {
        const text = document.getElementById("userInput").value.trim();
        if (!text) return;

        const display = document.getElementById("chatDisplay");
        const tip = document.querySelector(".empty-tip");
        if (tip) tip.remove();

        const userMsgDiv = document.createElement("div");
        userMsgDiv.className = "msg user-msg";
        userMsgDiv.innerHTML = `<div class="bubble user-bubble">${text}</div>`;
        display.appendChild(userMsgDiv);

        document.getElementById("userInput").value = "";
        display.scrollTop = display.scrollHeight;

        setTimeout(() => {
            const botMsgDiv = document.createElement("div");
            botMsgDiv.className = "msg ai-msg";
            botMsgDiv.innerHTML = `<div class="bubble ai-bubble">感谢您的提问。由于这是演示页面，我暂时无法给出实际回答。</div>`;
            display.appendChild(botMsgDiv);
            display.scrollTop = display.scrollHeight;
        }, 800);
    }
</script>

</body>
</html>
