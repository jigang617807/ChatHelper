<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body class="auth-shell">

<div class="auth-card">
    <h2 class="title">个人资料</h2>

    <div class="avatar-box">
        <img th:src="${user.avatarPath}" alt="用户头像">
    </div>

    <form action="/user/avatar" method="post" enctype="multipart/form-data">
        <label>更换头像</label>
        <input type="file" name="file" accept="image/*" onchange="preview(this)">
        <img id="previewImg" class="preview-img" alt="预览图">
        <button type="submit" class="btn">上传头像</button>
    </form>

    <form action="/user/update" method="post">
        <div class="profile-field">
            <label>性别：</label>
            <input type="text" name="gender" th:value="${user.gender}" placeholder="例如：男 / 女">
        </div>

        <div class="profile-field">
            <label>年龄：</label>
            <input type="number" name="age" th:value="${user.age}" placeholder="请输入年龄">
        </div>

        <div class="profile-field">
            <label>手机号：</label>
            <input type="text" name="phone" th:value="${user.phone}" placeholder="请输入手机号">
        </div>

        <button type="submit" class="btn">更新资料</button>
    </form>

    <div class="linkbar">
        <a href="/auth/home"><button type="button" class="btn btn-secondary">返回主页</button></a>
    </div>
</div>

<script>
    function preview(input) {
        const file = input.files[0];
        const previewImg = document.getElementById("previewImg");
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = "block";
        } else {
            previewImg.style.display = "none";
        }
    }
</script>

</body>
</html>
