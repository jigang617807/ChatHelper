<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料维护</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body>

<div class="app-shell profile-app-shell">
    <main class="profile-workbench">
        <section class="profile-header-panel">
            <div class="profile-identity">
                <div class="profile-avatar-wrap">
                    <img th:src="${user.avatarPath}" alt="用户头像">
                </div>
                <div>
                    <p class="eyebrow">User Profile</p>
                    <h1 th:text="${user.username}">用户名</h1>
                    <p>维护头像、联系方式和基础信息，方便后续在文档工作流中展示个人身份。</p>
                </div>
            </div>
            <div class="document-hero-actions">
                <a href="/auth/home"><button type="button" class="btn btn-secondary">返回首页</button></a>
                <a href="/doc/list"><button type="button" class="btn btn-secondary">文档工作台</button></a>
            </div>
        </section>

        <section class="profile-grid">
            <article class="profile-panel">
                <div class="section-heading">
                    <span>头像</span>
                    <small>支持常见图片格式</small>
                </div>

                <form action="/user/avatar" method="post" enctype="multipart/form-data" class="profile-form">
                    <label class="avatar-upload" for="avatarInput">
                        <span>选择新的头像</span>
                        <small>选择后会在下方预览</small>
                    </label>
                    <input id="avatarInput" type="file" name="file" accept="image/*" onchange="preview(this)" required>
                    <img id="previewImg" class="preview-img profile-preview-img" alt="头像预览">
                    <button type="submit" class="btn">上传头像</button>
                </form>
            </article>

            <article class="profile-panel">
                <div class="section-heading">
                    <span>基础资料</span>
                    <small>保存后立即生效</small>
                </div>

                <form action="/user/update" method="post" class="profile-form">
                    <div class="profile-field modern-profile-field">
                        <label>性别</label>
                        <input type="text" name="gender" th:value="${user.gender}" placeholder="例如：男 / 女 / 保密">
                    </div>

                    <div class="profile-field modern-profile-field">
                        <label>年龄</label>
                        <input type="number" name="age" th:value="${user.age}" placeholder="请输入年龄">
                    </div>

                    <div class="profile-field modern-profile-field">
                        <label>手机号</label>
                        <input type="text" name="phone" th:value="${user.phone}" placeholder="请输入手机号">
                    </div>

                    <button type="submit" class="btn">更新资料</button>
                </form>
            </article>
        </section>
    </main>
</div>

<script>
    function preview(input) {
        const file = input.files[0];
        const previewImg = document.getElementById("previewImg");
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = "block";
        } else {
            previewImg.style.display = "none";
        }
    }
</script>

</body>
</html>
