<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body class="auth-shell">

<div class="auth-card">
    <h2 class="title">创建账号</h2>
    <p class="subtitle">注册后即可上传文档并进行智能问答</p>

    <form action="/auth/register-page" method="post">
        <label>用户名</label>
        <input type="text" name="username" placeholder="请输入用户名">

        <label>性别</label>
        <input type="text" name="gender" placeholder="例如：男 / 女">

        <label>年龄</label>
        <input type="number" name="age" placeholder="请输入年龄">

        <label>手机号</label>
        <input type="text" name="phone" placeholder="请输入手机号" required>

        <label>密码</label>
        <input type="password" name="password" placeholder="请输入密码" required>

        <button type="submit" class="btn">立即注册</button>

        <p class="error" th:text="${error}"></p>

        <div class="linkbar">
            已有账号？ <a href="/auth/login">去登录</a>
        </div>
    </form>
</div>

</body>
</html>
