<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body>

<div class="auth-page-shell">
    <section class="auth-showcase">
        <p class="eyebrow">Create Account</p>
        <h1>开启你的文档知识库</h1>
        <p>注册后即可上传 PDF，构建个人 RAG 知识库，并使用 Agent 完成总结、分析和任务编排。</p>
        <div class="auth-feature-grid">
            <span>私有文档</span>
            <span>智能问答</span>
            <span>多路召回</span>
        </div>
    </section>

    <section class="auth-card auth-form-card register-form-card">
        <div class="auth-form-header">
            <p class="eyebrow">New User</p>
            <h2 class="title">创建账号</h2>
            <p class="subtitle">填写基础信息，手机号可用于找回密码。</p>
        </div>

        <form action="/auth/register-page" method="post" class="modern-auth-form">
            <div class="auth-two-col">
                <div>
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div>
                    <label>手机号</label>
                    <input type="text" name="phone" placeholder="请输入手机号" autocomplete="tel" required>
                </div>
            </div>

            <div class="auth-two-col">
                <div>
                    <label>性别</label>
                    <input type="text" name="gender" placeholder="例如：男 / 女 / 保密">
                </div>
                <div>
                    <label>年龄</label>
                    <input type="number" name="age" placeholder="请输入年龄">
                </div>
            </div>

            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" autocomplete="new-password" required>

            <button type="submit" class="btn">注册</button>

            <p class="error" th:if="${error}" th:text="${error}"></p>

            <div class="auth-links auth-links-center">
                <span>已有账号？<a href="/auth/login">返回登录</a></span>
            </div>
        </form>
    </section>
</div>

</body>
</html>
