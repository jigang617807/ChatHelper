<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body class="auth-shell">

<div class="auth-card">
    <h2 class="title">重置密码</h2>
    <p class="subtitle">通过手机号验证码重置登录密码</p>

    <form action="/auth/reset-password" method="post">
        <label>手机号</label>
        <input type="text" name="phone" placeholder="请输入注册手机号" required>

        <label>验证码</label>
        <div class="code-row">
            <input type="text" name="code" placeholder="验证码" required>
            <button type="button" class="btn btn-secondary code-btn" onclick="sendCode()">获取</button>
        </div>

        <label>新密码</label>
        <input type="password" name="newPassword" placeholder="请输入新密码" required>

        <button type="submit" class="btn">重置密码</button>

        <p class="error" th:text="${error}"></p>
        <p class="success" th:text="${success}"></p>

        <div class="linkbar">
            <a href="/auth/login">返回登录</a>
        </div>
    </form>
</div>

<script>
    function isValidPhone(phone) {
        return /^1[3-9]\d{9}$/.test(phone);
    }

    function sendCode() {
        const phoneInput = document.querySelector("input[name='phone']");
        const phone = phoneInput.value;
        const codeButton = document.querySelector(".code-btn");

        if (!phone) {
            alert("请先输入手机号！");
            return;
        }
        if (!isValidPhone(phone)) {
            alert("请输入有效的手机号码！");
            phoneInput.focus();
            return;
        }

        let countdown = 60;
        codeButton.disabled = true;
        codeButton.textContent = `${countdown}s`;

        const timer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                codeButton.textContent = `${countdown}s`;
            } else {
                clearInterval(timer);
                codeButton.textContent = "重新获取";
                codeButton.disabled = false;
            }
        }, 1000);

        fetch("/auth/sms?phone=" + phone)
            .then(r => r.text())
            .then(msg => alert(msg))
            .catch(error => console.error("发送验证码失败:", error));
    }
</script>

</body>
</html>
