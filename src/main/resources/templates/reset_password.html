<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body>

<div class="auth-page-shell">
    <section class="auth-showcase">
        <p class="eyebrow">Password Recovery</p>
        <h1>找回访问权限</h1>
        <p>通过注册手机号获取验证码，验证通过后即可重新设置登录密码。</p>
        <div class="auth-feature-grid">
            <span>短信验证</span>
            <span>身份确认</span>
            <span>密码重置</span>
        </div>
    </section>

    <section class="auth-card auth-form-card">
        <div class="auth-form-header">
            <p class="eyebrow">Reset Password</p>
            <h2 class="title">找回密码</h2>
            <p class="subtitle">请输入绑定手机号，获取验证码后设置新密码。</p>
        </div>

        <form action="/auth/reset-password" method="post" class="modern-auth-form">
            <label>手机号</label>
            <input type="text" name="phone" placeholder="请输入注册手机号" autocomplete="tel" required>

            <label>验证码</label>
            <div class="code-row modern-code-row">
                <input type="text" name="code" placeholder="请输入验证码" required>
                <button type="button" class="btn btn-secondary code-btn" onclick="sendCode()">获取验证码</button>
            </div>

            <label>新密码</label>
            <input type="password" name="newPassword" placeholder="请输入新密码" autocomplete="new-password" required>

            <button type="submit" class="btn">重置密码</button>

            <p class="error" th:if="${error}" th:text="${error}"></p>
            <p class="success" th:if="${success}" th:text="${success}"></p>

            <div class="auth-links auth-links-center">
                <a href="/auth/login">返回登录</a>
            </div>
        </form>
    </section>
</div>

<script>
    function isValidPhone(phone) {
        return /^1[3-9]\d{9}$/.test(phone);
    }

    function sendCode() {
        const phoneInput = document.querySelector("input[name='phone']");
        const phone = phoneInput.value.trim();
        const codeButton = document.querySelector(".code-btn");

        if (!phone) {
            alert("请先输入手机号。");
            phoneInput.focus();
            return;
        }
        if (!isValidPhone(phone)) {
            alert("请输入正确的手机号。");
            phoneInput.focus();
            return;
        }

        let countdown = 60;
        codeButton.disabled = true;
        codeButton.textContent = `${countdown}s`;

        const timer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                codeButton.textContent = `${countdown}s`;
            } else {
                clearInterval(timer);
                codeButton.textContent = "重新获取";
                codeButton.disabled = false;
            }
        }, 1000);

        fetch("/auth/sms?phone=" + encodeURIComponent(phone))
            .then(response => response.text())
            .then(message => alert(message))
            .catch(error => {
                console.error("验证码发送失败:", error);
                alert("验证码发送失败，请稍后重试。");
            });
    }
</script>

</body>
</html>
