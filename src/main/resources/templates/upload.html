<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传 PDF 文档</title>
    <link rel="stylesheet" href="/premium.css">
</head>
<body class="auth-shell">

<div class="auth-card">
    <h2 class="title">上传 PDF 文档</h2>
    <p class="subtitle">拖拽或选择文件，系统将自动切片并向量化</p>

    <div class="upload-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">⬆</div>
        <p>拖拽 PDF 到此处，或点击选择文件</p>
    </div>

    <form action="/doc/upload" method="post" enctype="multipart/form-data" id="uploadForm">
        <input type="file" name="file" accept="application/pdf" id="fileInput" required onchange="showFileName(this)">
        <div class="file-name" id="fileName"></div>
        <button type="submit" class="btn">上传文档</button>
    </form>

    <div class="linkbar">
        <a href="/auth/home"><button type="button" class="btn btn-secondary">返回主页</button></a>
    </div>
</div>

<script>
    function showFileName(input) {
        const file = input.files[0];
        if (file) {
            document.getElementById("fileName").textContent = "已选择：" + file.name;
        }
    }

    const dropArea = document.getElementById("dropArea");

    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.classList.add("dragover");
    });

    dropArea.addEventListener("dragleave", () => {
        dropArea.classList.remove("dragover");
    });

    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.classList.remove("dragover");

        const file = e.dataTransfer.files[0];
        if (file && file.type === "application/pdf") {
            document.getElementById("fileInput").files = e.dataTransfer.files;
            showFileName({ files: [file] });
        } else {
            alert("请上传 PDF 文件！");
        }
    });
</script>

</body>
</html>
